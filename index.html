<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사이버 방치형 RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrap">
    <h1 class="sr-only">사이버 방치형 RPG</h1>

    <div class="game-panel">
      <canvas id="gameCanvas" width="900" height="450"></canvas>

      <div class="top-ui">
        <div class="card">STAGE <span id="stage">1</span>/100</div>
        <div class="card">LV <span id="playerLevel">1</span></div>
        <div class="card">HP <span id="playerHp">120</span>/<span id="playerMaxHp">120</span></div>
        <div class="card">ATK <span id="playerAttack">10</span></div>
        <div class="card">EXP <span id="playerExp">0</span>/<span id="needExp">100</span></div>
        <div class="card">G <span id="gold">0</span></div>
        <div class="card">KILL <span id="stageKillCount">0</span>/<span id="stageKillGoal">10</span></div>
        <div class="card">TOTAL <span id="killCount">0</span></div>
      </div>

      <div class="bottom-ui">
        <button id="upgradeBtn" class="action-icon upgrade-icon" type="button" title="공격력 강화" aria-label="공격력 강화">
          <span class="upgrade-cost"><span id="upgradeCost">50</span></span>
        </button>

        <div class="control-bar">
          <button id="speedToggleBtn" type="button">2배속 OFF</button>
          <button id="skillModeToggleBtn" type="button">스킬 자동</button>
        </div>

        <div class="skill-bar" aria-label="스킬">
          <div id="spinSkillIcon" class="skill-icon ready" title="회전 베기"></div>
          <div id="lightningSkillIcon" class="skill-icon locked" title="10레벨 해금"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
